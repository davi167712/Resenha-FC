<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fut do IF</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="page-index">
 
  <!-- Fundo: gramado com linhas -->
  <div class="bg-grass">
    <div class="grass-lines"></div>
    <div class="grass-circle"></div>
    <div class="grass-overlay"></div>
  </div>
 
  <div class="container">
 
    <!-- Hero -->
    <header class="hero">
      <div class="hero-tag">⚽ Gerador de Times</div>
      <h1 class="hero-title">FUT DO<br><span>IF</span></h1>
    </header>
 
    <!-- Formulário principal -->
    <div class="form-wrapper">
 
      <!-- Coluna esquerda: textarea -->
      <div class="form-col form-col-main">
        <div class="field-header">
          <span class="field-icon">👥</span>
          <label class="field-label" for="nomes">Jogadores</label>
          <span class="field-hint">um por linha</span>
          <span class="contador" id="contador">0 jogadores</span>
        </div>
        <textarea
          id="nomes"
          class="textarea"
          placeholder="Digite os nomes aqui&#10;Um por linha..."
          rows="12"
          spellcheck="false"
        ></textarea>
      </div>
 
      <!-- Coluna direita: configuração + ações -->
      <div class="form-col form-col-side">
 
        <div class="side-block">

          <!-- Jogadores por time -->
          <div class="config-row">
            <label class="config-label" for="porTime">👥 Jogadores por time</label>
            <div class="num-control-sm">
              <button class="num-btn" id="numMenos">−</button>
              <input type="number" id="porTime" class="input-num-sm" value="4" min="1" max="20"/>
              <button class="num-btn" id="numMais">+</button>
            </div>
          </div>

          <div class="config-divider"></div>

          <!-- Vitórias para saída direta -->
          <div class="config-row">
            <label class="config-label" for="vitoriasSaida">🏆 Vitórias p/ saída direta</label>
            <div class="num-control-sm">
              <button class="num-btn" id="vitMenos">−</button>
              <input type="number" id="vitoriasSaida" class="input-num-sm" value="3" min="1" max="20"/>
              <button class="num-btn" id="vitMais">+</button>
            </div>
          </div>

          <div class="config-divider"></div>

          <!-- Tempo em minutos -->
          <div class="config-row">
            <label class="config-label" for="tempoJogo">⏱️ Tempo (minutos)</label>
            <div class="num-control-sm">
              <button class="num-btn" id="tempoMenos">−</button>
              <input type="number" id="tempoJogo" class="input-num-sm" value="7" min="1" max="60"/>
              <button class="num-btn" id="tempoMais">+</button>
            </div>
          </div>

        </div>
 
        <div class="side-actions">
          <button class="action-btn action-primary" id="btnEmbaralhar">
            <span class="action-icon">🔀</span>
            <span class="action-text">
              <strong>Embaralhar</strong>
            </span>
          </button>

          <button class="action-btn action-ordem" id="btnOrdem">
            <span class="action-icon">📋</span>
            <span class="action-text">
              <strong>Na Ordem</strong>
              <small>respeitar lista</small>
            </span>
          </button>
 
        
 
          <button class="action-btn action-danger" id="btnLimpar">
            <span class="action-icon">🗑️</span>
            <span class="action-text">
              <strong>Limpar</strong>
              <small>apagar tudo</small>
            </span>
          </button>
        </div>
 
      </div>
    </div>
 
    <div id="msgErro" class="msg-erro hidden"></div>
 
    <!-- Rodapé com dica -->
    <div class="tip-bar">
      💡 <strong>Dica:</strong>  Colque os nomes na ordem que os jogadores chegaram!
    </div>
 
  </div>
 
  <script src="script.js"></script>
  <!-- Assinatura -->
  <div class="assinatura">DAVI MENDES</div>
</body>
</html>
