<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fut do IF</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-index">
 
  <!-- Fundo: gramado com linhas -->
  <div class="bg-grass">
    <div class="grass-lines"></div>
    <div class="grass-circle"></div>
    <div class="grass-overlay"></div>
  </div>
 
  <div class="container">
 
    <!-- Hero -->
    <header class="hero">
      <div class="hero-tag">⚽ Gerador de Times</div>
      <h1 class="hero-title">FUT DO<br><span>IF</span></h1>
    </header>
 
    <!-- Formulário principal -->
    <div class="form-wrapper">
 
      <!-- Coluna esquerda: textarea -->
      <div class="form-col form-col-main">
        <div class="field-header">
          <span class="field-icon">👥</span>
          <label class="field-label" for="nomes">Jogadores</label>
          <span class="field-hint">um por linha</span>
          <span class="contador" id="contador">0 jogadores</span>
        </div>
        <textarea
          id="nomes"
          class="textarea"
          placeholder="Digite os nomes aqui&#10;Um por linha..."
          rows="12"
          spellcheck="false"
        ></textarea>
      </div>
 
      <!-- Coluna direita: configuração + ações -->
      <div class="form-col form-col-side">
 
        <div class="side-block">
          <div class="field-header">
            <span class="field-icon">🏃</span>
            <label class="field-label" for="porTime">Por time</label>
          </div>
          <div class="num-control">
            <button class="num-btn" id="numMenos">−</button>
            <input type="number" id="porTime" class="input-num" value="4" min="1" max="20"/>
            <button class="num-btn" id="numMais">+</button>
          </div>
          <p class="num-hint" id="numHint">Times de 4 jogadores</p>
        </div>
 
        <div class="side-actions">
          <button class="action-btn action-primary" id="btnEmbaralhar">
            <span class="action-icon">🔀</span>
            <span class="action-text">
              <strong>Embaralhar</strong>
             
            </span>
          </button>
 
        
 
          <button class="action-btn action-danger" id="btnLimpar">
            <span class="action-icon">🗑️</span>
            <span class="action-text">
              <strong>Limpar</strong>
              <small>apagar tudo</small>
            </span>
          </button>
        </div>
 
      </div>
    </div>
 
    <div id="msgErro" class="msg-erro hidden"></div>
 
    <!-- Rodapé com dica -->
    <div class="tip-bar">
      💡 <strong>Dica:</strong>  Colque os nomes na ordem que os jogadores chegaram!
    </div>
 
  </div>
 
  <script src="script.js"></script></body>
</html>
